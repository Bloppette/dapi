services:
  dapi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dapi-backend-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
  
  dapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dapi
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: dapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dapi
      POSTGRES_PASSWORD: dapi
      POSTGRES_DB: dapi
    ports:
      - "5432:5432"
    volumes:
      - dapi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dapi -d dapi"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  default:
    name: dapi-network
    driver: bridge

volumes:
  dapi_pgdata: