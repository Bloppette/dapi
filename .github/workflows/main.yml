name: Build and Deploy DAPI Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  registry: ghcr.io
  image_name: ${{ github.repository }}

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    secrets: inherit

  build-and-push:
    uses: ./.github/workflows/build.yml
    needs: lint
    secrets: inherit
    permissions:
      contents: read
      packages: write

